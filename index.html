<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copicu</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__copicuBoot = {
        htmlAt: performance.now(),
        htmlEpoch: Date.now(),
      };
      console.info("[copicu:boot] html parsed", window.__copicuBoot);
      setTimeout(() => {
        const root = document.getElementById("root");
        if (root && root.childElementCount === 0) {
          console.warn("[copicu:boot] root still empty", {
            elapsed: performance.now() - window.__copicuBoot.htmlAt,
            readyState: document.readyState,
            resources: performance.getEntriesByType("resource").map((entry) => ({
              name: entry.name,
              duration: entry.duration,
              startTime: entry.startTime,
            })),
          });
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
